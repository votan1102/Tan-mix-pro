name: Build Tan Mix-Pro APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Cài đặt Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cài đặt Java (Cho Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Xây dựng bộ khung React & Tailwind
        run: |
          npx create-vite@latest app-build --template react
          cd app-build
          npm install
          npm install lucide-react
          npm install -D tailwindcss postcss autoprefixer
          npx tailwindcss init -p
          echo "/** @type {import('tailwindcss').Config} */ export default { content: ['./index.html', './src/**/*.{js,ts,jsx,tsx}'], theme: { extend: {} }, plugins: [], }" > tailwind.config.js
          echo "@tailwind base; @tailwind components; @tailwind utilities; body { background-color: #050505; overscroll-behavior: none; }" > src/index.css
          cp ../App.jsx src/App.jsx

      - name: Tích hợp lõi Capacitor (Trình bọc Mobile)
        run: |
          cd app-build
          npm install @capacitor/core @capacitor/android
          npm install -D @capacitor/cli
          npx cap init TanMixPro com.anhtan.mixpro --web-dir dist
          npm run build
          npx cap add android
          npx cap sync android

      - name: Tiến hành Build file APK
        run: |
          cd app-build/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Đóng gói và Gửi File APK
        uses: actions/upload-artifact@v4
        with:
          name: Tan-Mix-Pro-App
          path: app-build/android/app/build/outputs/apk/debug/app-debug.apk
