name: Build Tan Mix-Pro APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Lấy mã nguồn
        uses: actions/checkout@v4

      - name: 2. Cài đặt Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Cài đặt Java 17 (Cho Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 4. Khởi tạo dự án React (Bỏ qua câu hỏi Y/N)
        run: |
          npm create vite@latest app-build -- --template react
          cd app-build
          npm install
          npm install lucide-react
          npm install -D tailwindcss postcss autoprefixer
          npx tailwindcss init -p

      - name: 5. Cấu hình giao diện và Nhúng code
        run: |
          cd app-build
          echo "/** @type {import('tailwindcss').Config} */ export default { content: ['./index.html', './src/**/*.{js,ts,jsx,tsx}'], theme: { extend: {} }, plugins: [], }" > tailwind.config.js
          echo "@tailwind base; @tailwind components; @tailwind utilities; body { background-color: #050505; overscroll-behavior: none; }" > src/index.css
          cp ../App.jsx src/App.jsx

      - name: 6. Build Web (Kiểm tra lỗi Code)
        run: |
          cd app-build
          npm run build

      - name: 7. Tích hợp Mobile Capacitor
        run: |
          cd app-build
          npm install @capacitor/core @capacitor/android
          npm install -D @capacitor/cli
          npx cap init TanMixPro com.anhtan.mixpro --web-dir dist
          npx cap add android
          npx cap sync android

      - name: 8. Build file APK Android
        run: |
          cd app-build/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 9. Đóng gói và Gửi File APK
        uses: actions/upload-artifact@v4
        with:
          name: Tan-Mix-Pro-App
          path: app-build/android/app/build/outputs/apk/debug/app-debug.apk
