name: Build Tan Mix-Pro APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Lấy mã nguồn & Logo
        uses: actions/checkout@v4

      - name: 2. Cài đặt Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Cài đặt Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: 4. Khởi tạo dự án
        run: |
          npm create vite@latest app-build -- --template react
          cd app-build
          npm install
          npm install lucide-react

      - name: 5. Cấu hình Tailwind v4 & Nhúng Code
        run: |
          cd app-build
          npm install tailwindcss @tailwindcss/vite
          echo "import { defineConfig } from 'vite'; import react from '@vitejs/plugin-react'; import tailwindcss from '@tailwindcss/vite'; export default defineConfig({ plugins: [react(), tailwindcss()] });" > vite.config.js
          echo '@import "tailwindcss"; body { background-color: #050505; overscroll-behavior: none; }' > src/index.css
          cp ../App.jsx src/App.jsx

      - name: 6. Build Web
        run: |
          cd app-build
          npm run build

      - name: 7. Tích hợp Mobile Capacitor
        run: |
          cd app-build
          npm install @capacitor/core @capacitor/android
          npm install -D @capacitor/cli
          ./node_modules/.bin/cap init TanMixPro com.anhtan.mixpro --web-dir dist
          ./node_modules/.bin/cap add android
          echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties
          ./node_modules/.bin/cap sync android

      - name: 7.2. [THƯƠNG HIỆU] Thay Logo (Sửa lỗi tạo thư mục)
        run: |
          cd app-build
          npm install --save-dev @capacitor/assets
          # Tự động tạo thư mục assets nếu chưa có để tránh lỗi No such file
          mkdir -p assets
          cp ../logo.png assets/logo.png
          npx @capacitor/assets generate --iconPath assets/logo.png --platforms android

      - name: 7.5. [TRỌNG TÀI] Xử lý lỗi trùng thư viện
        run: |
          echo "configurations.all { exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8' }" >> app-build/android/app/build.gradle
          echo "configurations.all { resolutionStrategy { force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22' } }" >> app-build/android/app/build.gradle

      - name: 8. Build file APK Android
        run: |
          cd app-build/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 9. Xuất File APK
        uses: actions/upload-artifact@v4
        with:
          name: Tan-Mix-Pro-App
          path: app-build/android/app/build/outputs/apk/debug/app-debug.apk
